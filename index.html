<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Fall School on Agentic AI | University of Toronto</title>
    <meta name="description" content="The official landing page for the 2026 Fall School on Agentic AI at the University of Toronto. Stay tuned for more details.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ai-for-science-org.github.io/">
    <meta property="og:title" content="2026 Fall School on Agentic AI | University of Toronto">
    <meta property="og:description" content="More details about the 2026 Fall School on Agentic AI coming soon.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b1120;
            --card-bg: rgba(15, 23, 42, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #007894;
            --accent-glow: #6fc7ea;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --primary-font: 'Outfit', 'Inter', sans-serif;
            --secondary-font: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--primary-font);
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .background-glows {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            animation-duration: 25s;
        }

        .orb-2 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-primary) 0%, transparent 70%);
            bottom: -150px;
            right: -150px;
            animation-duration: 30s;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #4f46e5 0%, transparent 70%);
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.08;
            animation-duration: 18s;
            animation-delay: -2s;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, #000 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, #000 40%, transparent 100%);
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(5%, 8%) scale(1.1);
            }
            100% {
                transform: translate(-3%, -5%) scale(0.95);
            }
        }

        /* Header logo bar */
        header {
            width: 100%;
            max-width: 1200px;
            padding: 2.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo-container {
            background: #ffffff;
            padding: 0.85rem 2.25rem;
            border-radius: 50px;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.25), 
                0 0 0 1px rgba(255, 255, 255, 0.1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }

        .logo-container:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.35), 
                0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        .logo-img {
            height: 44px;
            width: auto;
            object-fit: contain;
            display: block;
        }

        /* Menu Toggle Button */
        .menu-toggle {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            z-index: 100;
            transition: background 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
        }

        .menu-toggle:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .menu-toggle:active {
            transform: scale(0.95);
        }

        .bar {
            width: 20px;
            height: 2px;
            background-color: var(--text-primary);
            border-radius: 2px;
            transition: transform 0.3s ease, opacity 0.3s ease, background-color 0.3s ease;
        }

        /* Animate Hamburger to X */
        .menu-toggle[aria-expanded="true"] .bar-1 {
            transform: translateY(7px) rotate(45deg);
            background-color: var(--accent-glow);
        }

        .menu-toggle[aria-expanded="true"] .bar-2 {
            opacity: 0;
        }

        .menu-toggle[aria-expanded="true"] .bar-3 {
            transform: translateY(-7px) rotate(-45deg);
            background-color: var(--accent-glow);
        }

        /* Slide-out Drawer Navigation */
        .drawer-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 90;
            visibility: hidden;
            transition: visibility 0.4s;
        }

        .drawer-menu.active {
            visibility: visible;
        }

        .drawer-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 8, 16, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .drawer-menu.active .drawer-overlay {
            opacity: 1;
        }

        .drawer-content {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            max-width: 360px;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-left: 1px solid var(--card-border);
            padding: 7rem 2.5rem 2.5rem 2.5rem;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.3);
        }

        .drawer-menu.active .drawer-content {
            transform: translateX(0);
        }

        .drawer-header {
            margin-bottom: 2rem;
        }

        .drawer-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #ffffff 40%, #c8f2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .drawer-links {
            list-style: none;
        }

        .drawer-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            transition: background 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
        }

        .drawer-link:hover {
            background: rgba(111, 199, 234, 0.06);
            border-color: rgba(111, 199, 234, 0.3);
            transform: translateY(-2px);
            color: var(--accent-glow);
        }

        .drawer-link:active {
            transform: translateY(0);
        }

        .link-arrow {
            width: 18px;
            height: 18px;
            opacity: 0.6;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .drawer-link:hover .link-arrow {
            transform: translateX(4px);
            opacity: 1;
        }

        /* Main Content area */
        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 1.5rem;
            z-index: 10;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px;
            padding: 3.5rem 3rem;
            width: 100%;
            max-width: 640px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: cardFadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Decorative glowing border accent */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-glow), var(--accent-primary), transparent);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(111, 199, 234, 0.08);
            border: 1px solid rgba(111, 199, 234, 0.2);
            color: var(--accent-glow);
            padding: 0.5rem 1.25rem;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-glow);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-glow);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(111, 199, 234, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 6px rgba(111, 199, 234, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(111, 199, 234, 0);
            }
        }

        h1 {
            font-size: 2.75rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1.25rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 40%, #c8f2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-family: var(--secondary-font);
            font-size: 1.15rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 0.5rem;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Footer */
        footer {
            width: 100%;
            padding: 2.5rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-family: var(--secondary-font);
            z-index: 10;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        footer p {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            .card {
                padding: 2.5rem 1.75rem;
            }
            
            h1 {
                font-size: 2.15rem;
            }

            .logo-container {
                padding: 0.7rem 1.5rem;
            }

            .logo-img {
                height: 36px;
            }
        }
    </style>
</head>
<body>

    <!-- Ambient glowing backgrounds -->
    <div class="background-glows" aria-hidden="true">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- Header containing University of Toronto Logo & Hamburger Toggle -->
    <header>
        <div class="logo-container" id="logo-wrapper">
            <img src="imgs/uoft_logo.png" alt="University of Toronto" class="logo-img" id="uoft-logo">
        </div>
        <button class="menu-toggle" id="menu-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="drawer-menu">
            <span class="bar bar-1"></span>
            <span class="bar bar-2"></span>
            <span class="bar bar-3"></span>
        </button>
    </header>

    <!-- Slide-out Navigation Drawer -->
    <aside class="drawer-menu" id="drawer-menu" aria-hidden="true">
        <div class="drawer-overlay" id="drawer-overlay"></div>
        <nav class="drawer-content" aria-label="Archive Navigation">
            <div class="drawer-header">
                <h2>Past Editions</h2>
            </div>
            <ul class="drawer-links">
                <li>
                    <a href="2025/index.html" class="drawer-link">
                        <span>2025 Workshop</span>
                        <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- Main Card Content -->
    <main>
        <section class="card" id="main-card" aria-labelledby="card-title">
            <div class="badge" id="coming-badge">
                <span class="badge-dot" aria-hidden="true"></span>
                Coming Fall 2026
            </div>
            
            <h1 id="card-title">2026 Fall School on Agentic AI</h1>
            
            <p class="subtitle" id="card-subtitle">
                More details about the 2026 Fall School on Agentic AI coming soon.
            </p>
        </section>
    </main>

    <!-- Footer links -->
    <footer>
        <p>&copy; 2026 University of Toronto. All rights reserved.</p>
    </footer>

    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const drawerMenu = document.getElementById('drawer-menu');
        const drawerOverlay = document.getElementById('drawer-overlay');

        function toggleMenu() {
            const isOpen = menuToggle.getAttribute('aria-expanded') === 'true';
            menuToggle.setAttribute('aria-expanded', !isOpen);
            drawerMenu.classList.toggle('active');
            drawerMenu.setAttribute('aria-hidden', isOpen);
            
            // Toggle body scroll to prevent background scrolling when menu is active
            document.body.style.overflow = isOpen ? '' : 'hidden';
        }

        menuToggle.addEventListener('click', toggleMenu);
        drawerOverlay.addEventListener('click', toggleMenu);

        // Close menu on ESC keypress
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape' && drawerMenu.classList.contains('active')) {
                toggleMenu();
            }
        });
    </script>
</body>
</html>
